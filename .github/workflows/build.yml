name: Build LSPosed module

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.1.0'

      - name: Decode signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "No KEYSTORE_BASE64 secret set; release APK will be debug-signed."
            exit 0
          fi
          mkdir -p "$RUNNER_TEMP/keys"
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/keys/release.jks"
          echo "KEYSTORE_FILE=$RUNNER_TEMP/keys/release.jks" >> "$GITHUB_ENV"

      - name: Assemble release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: gradle :app:assembleRelease --no-daemon --stacktrace

      - name: Rename APK
        id: apk
        run: |
          SRC=$(find app/build/outputs/apk/release -name '*.apk' | head -n1)
          REF="${GITHUB_REF##*/}"
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION="$REF"
          else
            VERSION="${GITHUB_SHA::7}"
          fi
          DEST_DIR="$RUNNER_TEMP/out"
          mkdir -p "$DEST_DIR"
          DEST="$DEST_DIR/BootloaderSpoofer-${VERSION}.apk"
          cp "$SRC" "$DEST"
          echo "path=$DEST"               >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$DEST")" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION"         >> "$GITHUB_OUTPUT"

      - name: Verify LSPosed module marker
        run: |
          APK="${{ steps.apk.outputs.path }}"
          if ! unzip -l "$APK" | grep -q 'META-INF/xposed/module.prop'; then
            echo "::error::APK is missing META-INF/xposed/module.prop, not a valid LSPosed module"
            exit 1
          fi
          if ! unzip -l "$APK" | grep -q 'META-INF/xposed/java_init.list'; then
            echo "::error::APK is missing META-INF/xposed/java_init.list, module entry point not declared"
            exit 1
          fi
          echo "LSPosed module markers present:"
          unzip -p "$APK" META-INF/xposed/module.prop
          echo "---"
          unzip -p "$APK" META-INF/xposed/java_init.list

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk.outputs.name }}
          path: ${{ steps.apk.outputs.path }}
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.apk.outputs.version }}
          tag_name: ${{ steps.apk.outputs.version }}
          files: ${{ steps.apk.outputs.path }}
          generate_release_notes: true
          body: |
            LSPosed module APK. Install via LSPosed Manager: open the APK with LSPosed (or install the APK normally, then enable the module under LSPosed Manager > Modules).

            Requires LSPosed (libxposed API 101 or newer). minSdk 26.
